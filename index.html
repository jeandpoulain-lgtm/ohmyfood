<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/8f2991717e.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700&family=Shrikhand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Accueil - OhMyFood</title>
</head>

    <body>
        <header class="header">
            <img src="./images/logo/ohmyfood.png" alt="Logo ohmyfood" class="header__logo">
        </header>

        <main>
            <section class="location">
                <i class="fa-solid fa-location-dot"></i>
                <span>Paris, Belleville</span>
            </section>

            <section class="hero">
                <h1>Réservez le menu qui vous convient</h1>
                <p>Découvrez des restaurants d'exception, sélectionnés par nos soins.</p>
                <button class="btn">Explorer nos restaurants</button>
            </section>
                
            <section class="steps">

            <h2 class="steps__title">Fonctionnement</h2>
                <ol class="steps__list"> 
                    <li class="steps__item">
                        <span class="steps__number">1</span>
                        <i class="fa-solid fa-mobile-screen-button"></i>
                        <span class="steps__text">Choisissez un restaurant</span>
                    </li>

                    <li class="steps__item">
                        <span class="steps__number">2</span>
                        <i class="fa-solid fa-list-ul"></i>
                        <span class="steps__text">Composez votre menu</span>
                    </li>

                    <li class="steps__item steps__item--purple"> 
                        <span class="steps__number">3</span>
                        <i class="fa-solid fa-store"></i>
                        <span class="steps__text">Dégustez au restaurant</span>
                    </li>
                </ol>

            </section>
        </main>
    </body>
</html>
